porkbot_chat_widget.settings:
  type: config_object
  label: 'Porkbot Chat Widget settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable widget'
    load_admin:
      type: boolean
      label: 'Load on admin pages'
    script_url:
      type: string
      label: 'Widget script URL'
    init_method:
      type: string
      label: 'Init method path'
    init_options:
      type: text
      label: 'Init options JSON'
    api_base_url:
      type: string
      label: 'API base URL'
    api_prefix:
      type: string
      label: 'API path prefix'
    default_mode:
      type: string
      label: 'Default interface mode'
    open_by_default:
      type: boolean
      label: 'Open widget by default'
