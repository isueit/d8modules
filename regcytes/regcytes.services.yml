services:
  regcytes.repository:
    class: Drupal\regcytes\GroupPathPrefixRepository
    arguments:
      - '@database'
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@entity.repository'
      - '@request_stack'
  regcytes.path_prefix_context:
    class: Drupal\regcytes\Context\GroupContextPathPrefix
    arguments:
      - '@request_stack'
      - '@current_route_match'
      - '@regcytes.repository'
    tags:
      - { name: 'context_provider' }
  regcytes.site_prefix_manager:
    class: Drupal\regcytes\SitePrefixManager
    arguments:
      - '@regcytes.repository'
      - '@config.factory'

